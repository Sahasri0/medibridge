<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBridge 2.2 | AI Medical Assistant</title>
    <!-- SEO and Metadata -->
    <meta name="description" content="AI Powered Medical Interpretation with India-focused health insights, Ayushman Bharat checks, and Jan Aushadhi alternatives.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            min-height: 100vh;
            color: #f1f5f9;
        }
        .main-bg {
            background-image: radial-gradient(at top left, #1e3a8a 0%, transparent 40%),
                              radial-gradient(at bottom right, #4c1d95 0%, transparent 40%);
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .upload-area:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
            background: rgba(56, 189, 248, 0.02);
        }
        .loader {
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-accent { color: #10b981; }
        .reveal { animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="main-bg p-6 lg:p-12">
    <header class="w-full max-w-6xl mx-auto mb-16 flex items-center justify-between reveal">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center shadow-2xl shadow-sky-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="white" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </div>
            <div>
                <h1 class="text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Medi<span class="text-sky-400">Bridge</span></h1>
                <p class="text-slate-500 text-xs font-bold tracking-[0.2em] uppercase mt-1">v2.1 Beta • PROMPTWARS SPECIAL</p>
            </div>
        </div>
        <div class="hidden md:flex gap-4">
            <button onclick="findNearby('hospitals')" class="px-5 py-2.5 rounded-full border border-white/10 hover:bg-white/5 transition-all text-xs font-bold tracking-widest text-slate-300">NEARBY HOSPITALS</button>
            <button onclick="findNearby('pharmacies')" class="px-5 py-2.5 rounded-full border border-white/10 hover:bg-white/5 transition-all text-xs font-bold tracking-widest text-slate-300">NEARBY PHARMACIES</button>
        </div>
    </header>

    <main class="w-full max-w-6xl mx-auto grid lg:grid-cols-12 gap-8">
        <!-- Input Section -->
        <section class="lg:col-span-4 flex flex-col gap-6">
            <div class="glass rounded-[2.5rem] p-10 flex flex-col gap-8 transition-transform hover:scale-[1.01]">
                <header>
                    <h2 class="text-2xl font-bold italic flex items-center gap-4">
                        <span class="w-4 h-10 bg-sky-500 rounded-full inline-block"></span>
                        Analyze File
                    </h2>
                </header>
                
                <div class="relative group">
                    <input type="file" id="imageInput" accept="image/jpeg,image/png" class="hidden">
                    <label for="imageInput" class="upload-area border-2 border-dashed border-slate-800 rounded-3xl p-12 flex flex-col items-center justify-center gap-6 cursor-pointer transition-all duration-500 bg-slate-950/20">
                        <div id="previewContainer" class="hidden w-full h-56 overflow-hidden rounded-2xl border border-white/5">
                            <img id="imagePreview" class="w-full h-full object-cover" alt="Document preview">
                        </div>
                        <div id="uploadPrompt" class="flex flex-col items-center text-center gap-4">
                            <div class="w-20 h-20 rounded-full bg-sky-500/5 flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10 text-sky-400">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                                </svg>
                            </div>
                            <p class="text-sm font-bold text-slate-200">Select Medical Photo</p>
                            <p class="text-[10px] text-slate-600 font-black tracking-widest uppercase">JPG/PNG only • Max 5MB</p>
                        </div>
                    </label>
                </div>

                <div class="flex flex-col gap-3">
                    <label for="notes" class="text-xs font-black uppercase tracking-widest text-slate-500">Symptoms / Context</label>
                    <textarea id="notes" rows="4" placeholder="e.g., Fever since 3 days..." class="w-full rounded-2xl bg-slate-950/40 border border-slate-800/50 p-5 text-sm focus:outline-none focus:ring-4 focus:ring-sky-500/10 transition-all placeholder:text-slate-700 resize-none"></textarea>
                </div>

                <button id="analyzeBtn" class="w-full h-16 bg-gradient-to-r from-sky-600 to-sky-500 text-white font-black tracking-widest rounded-2xl flex items-center justify-center gap-4 shadow-2xl shadow-sky-500/20 active:scale-[0.98] transition-all disabled:opacity-50">
                    <span id="btnText">INITIATE ANALYSIS</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>
            </div>
            
            <footer class="p-6">
                <div class="bg-amber-500/5 border border-amber-500/10 rounded-xl p-4">
                    <p class="text-[10px] text-amber-500/70 font-bold uppercase tracking-wider text-center">
                        Disclaimer: Not medical advice. Consult a doctor.
                    </p>
                </div>
            </footer>
        </section>

        <!-- Output Section -->
        <section class="lg:col-span-8 flex flex-col gap-8">
            <div id="resultCard" class="glass rounded-[3rem] p-12 min-h-[600px] opacity-40 grayscale pointer-events-none transition-all duration-700">
                <header class="flex flex-wrap items-center justify-between border-b border-white/5 pb-8 mb-10 gap-6">
                    <h2 class="text-3xl font-black italic tracking-tight">AI Interpretation</h2>
                    <div id="urgencyBadge" class="hidden px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border">
                        PRIORITY: <span id="urgencyText">-</span>
                    </div>
                </header>

                <div id="analysisContent" class="flex flex-col gap-10">
                    <div class="grid md:grid-cols-2 gap-10">
                        <div>
                            <h3 class="text-xs font-black text-sky-400 uppercase tracking-widest mb-4">Medications</h3>
                            <div id="medicationsList" class="flex flex-col gap-3"></div>
                        </div>
                        <div>
                            <h3 class="text-xs font-black text-emerald-400 uppercase tracking-widest mb-4">Generic Alternatives</h3>
                            <div id="genericsList" class="flex flex-col gap-3"></div>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-4">India Health Schemes</h3>
                        <p id="schemeResult" class="text-sm font-bold text-indigo-100 bg-indigo-500/10 p-4 rounded-xl"></p>
                    </div>

                    <div class="grid md:grid-cols-2 gap-10">
                        <div>
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Diagnostics</h3>
                            <p id="symptomsText" class="text-sm text-slate-300 leading-relaxed"></p>
                        </div>
                        <div>
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Next Steps</h3>
                            <p id="nextStepsText" class="text-sm text-slate-300 leading-relaxed"></p>
                        </div>
                    </div>
                    
                    <div id="multilingualDisclaimer" class="pt-8 border-t border-white/5 text-[10px] text-slate-500 uppercase tracking-wider font-bold"></div>
                </div>
            </div>

            <!-- Nearby Care Section -->
            <section id="nearby-section" class="hidden reveal flex flex-col gap-6">
                <header class="flex items-center justify-between">
                    <h2 class="text-2xl font-black italic tracking-tight">Nearby Assistance</h2>
                    <span id="loaderNearby" class="hidden animate-pulse text-[10px] font-black text-sky-400">SCANNING...</span>
                </header>
                
                <div id="manualSearchArea" class="hidden glass p-6 rounded-3xl flex flex-col gap-4">
                    <p class="text-sm font-bold text-slate-300">GPS access denied. Enter your area manually:</p>
                    <div class="flex gap-4">
                        <input type="text" id="areaInput" placeholder="e.g., Banjara Hills, Hyderabad" class="flex-1 bg-slate-950/50 border border-slate-800 p-4 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                        <button onclick="manualCareSearch()" class="bg-sky-600 px-8 py-4 rounded-2xl font-bold text-sm hover:bg-sky-500">SEARCH</button>
                    </div>
                </div>

                <div id="nearbyContainer" class="grid md:grid-cols-3 gap-6"></div>
            </section>
        </section>
    </main>

    <!-- Google Maps Loader (v3.54+ Standard) -->
    <script>
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.googleapis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyA8oGYfI-DQorzdCrstmby5TwDd-2zL2kg",
            v: "weekly"
        });
    </script>

    <script>
        const imageInput = document.getElementById('imageInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const resultCard = document.getElementById('resultCard');
        const uploadPrompt = document.getElementById('uploadPrompt');
        
        let base64Image = '';
        let cooldownActive = false;

        async function compressImage(file, targetWidth = 800) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = targetWidth / img.width;
                        canvas.width = targetWidth;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!['image/jpeg', 'image/png'].includes(file.type)) return alert('Select PNG/JPG');
            if (file.size > 5 * 1024 * 1024) return alert('File too large');

            base64Image = await compressImage(file);
            imagePreview.src = base64Image;
            previewContainer.classList.remove('hidden');
            uploadPrompt.classList.add('hidden');
            resultCard.classList.add('opacity-40', 'grayscale');
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!base64Image) return alert('Select file first');
            if (cooldownActive) return;

            cooldownActive = true;
            analyzeBtn.disabled = true;
            setTimeout(() => { cooldownActive = false; analyzeBtn.disabled = false; }, 3000);

            btnText.textContent = 'ANALYZING...';
            btnLoader.classList.remove('hidden');
            resultCard.classList.add('animate-pulse');

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        image: base64Image, 
                        notes: document.getElementById('notes').value 
                    })
                });
                const data = await response.json();
                renderResults(data);
                if (data.urgency === 'high') findNearby('hospitals');
            } catch (err) {
                console.error(err);
            } finally {
                btnText.textContent = 'INITIATE ANALYSIS';
                btnLoader.classList.add('hidden');
                resultCard.classList.remove('animate-pulse', 'opacity-40', 'grayscale');
                resultCard.style.pointerEvents = 'auto';
            }
        });

        function renderResults(data) {
            const urgency = (data.urgency || 'low').toLowerCase();
            document.getElementById('urgencyText').textContent = urgency.toUpperCase();
            document.getElementById('urgencyBadge').classList.remove('hidden');
            document.getElementById('urgencyBadge').className = `px-5 py-2 rounded-full text-[10px] font-black border ${urgency === 'high' ? 'bg-red-500/10 text-red-400 border-red-500/30' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30'}`;

            document.getElementById('medicationsList').innerHTML = (data.medications || []).map(m => `<div class="p-4 rounded-xl bg-white/5 border border-white/5 text-xs font-bold">${m.name || m} <br><span class="text-sky-400 font-medium">${m.dosage || ''}</span></div>`).join('');
            document.getElementById('genericsList').innerHTML = (data.generic_alternatives || []).map(g => `<div class="p-3 rounded-xl bg-emerald-500/5 text-emerald-400 font-bold border border-emerald-500/10">${g}</div>`).join('');
            document.getElementById('symptomsText').textContent = data.symptoms || data.insights;
            document.getElementById('nextStepsText').textContent = data.nextSteps;
            document.getElementById('schemeResult').textContent = data.scheme_eligibility || 'Check Ayushman Bharat eligibility locally.';
            document.getElementById('multilingualDisclaimer').textContent = data.disclaimer;
        }

        let careType = 'hospitals';

        // v2.2 Modern Places API Migration
        async function findNearby(type) {
            careType = type;
            const section = document.getElementById('nearby-section');
            const container = document.getElementById('nearbyContainer');
            const loader = document.getElementById('loaderNearby');
            const manualArea = document.getElementById('manualSearchArea');

            section.classList.remove('hidden');
            loader.classList.remove('hidden');
            container.innerHTML = '';
            manualArea.classList.add('hidden');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async position => {
                    const center = { lat: position.coords.latitude, lng: position.coords.longitude };
                    executeCareSearch(center, type);
                }, () => {
                    loader.classList.add('hidden');
                    manualArea.classList.remove('hidden');
                });
            } else {
                manualArea.classList.remove('hidden');
            }
        }

        async function manualCareSearch() {
            const area = document.getElementById('areaInput').value;
            if (!area) return alert('Enter an area');
            
            const { Geocoder } = await google.maps.importLibrary("geocoding");
            const geocoder = new Geocoder();
            geocoder.geocode({ address: area }, (results, status) => {
                if (status === 'OK') {
                    const center = { lat: results[0].geometry.location.lat(), lng: results[0].geometry.location.lng() };
                    executeCareSearch(center, careType);
                } else {
                    alert('Location not found');
                }
            });
        }

        async function executeCareSearch(center, type) {
            const container = document.getElementById('nearbyContainer');
            const loader = document.getElementById('loaderNearby');
            
            try {
                const { Place } = await google.maps.importLibrary("places");
                const request = {
                    fields: ["displayName", "location", "rating", "formattedAddress"],
                    locationRestriction: { center, radius: 4000 },
                    includedPrimaryTypes: [type === 'hospitals' ? "hospital" : "pharmacy"],
                    maxResultCount: 3,
                };

                const { places } = await Place.searchNearby(request);
                loader.classList.add('hidden');
                
                if (places.length) {
                    places.forEach(place => {
                        container.innerHTML += `
                            <div class="glass p-6 rounded-3xl border border-white/5 flex flex-col gap-3 transition-all hover:-translate-y-1">
                                <h4 class="text-sm font-black italic text-sky-100">${place.displayName}</h4>
                                <p class="text-[10px] text-slate-500 leading-tight">${place.formattedAddress}</p>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-[10px] font-black text-emerald-400">★ ${place.rating || 'N/A'}</span>
                                    <span class="px-2 py-1 bg-white/5 rounded-full text-[9px] font-bold text-slate-400 uppercase tracking-tighter shadow-sm">Verified</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<p class="text-xs text-slate-500 col-span-3 text-center">No care facilities found nearby.</p>';
                }
            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
                container.innerHTML = '<p class="text-xs text-slate-500 col-span-3 text-center">Search error. High demand for care.</p>';
            }
        }
    </script>
</body>
</html>
