<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBridge | AI Medical Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .upload-area:hover {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">
    <header class="w-full max-w-4xl mb-12 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-sky-500 flex items-center justify-center shadow-lg shadow-sky-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="white" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Medi<span class="text-sky-400">Bridge</span></h1>
        </div>
        <div class="hidden md:block px-4 py-1.5 rounded-full glass text-xs font-semibold text-sky-400 border-sky-400/20">
            AI POWERED MEDICAL INSIGHTS
        </div>
    </header>

    <main class="w-full max-w-4xl grid md:grid-cols-2 gap-8">
        <div class="flex flex-col gap-6">
            <div class="glass rounded-3xl p-8 flex flex-col gap-6">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-sky-400">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                    Upload Document
                </h2>
                
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <label for="imageInput" class="upload-area border-2 border-dashed border-slate-700 rounded-2xl p-10 flex flex-col items-center justify-center gap-4 cursor-pointer transition-all duration-300 group">
                    <div id="previewContainer" class="hidden w-full h-40 overflow-hidden rounded-xl border border-slate-700 bg-slate-900/50">
                        <img id="imagePreview" class="w-full h-full object-cover">
                    </div>
                    <div id="uploadPrompt" class="flex flex-col items-center gap-2">
                        <div class="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center group-hover:bg-sky-500/10 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-slate-400 group-hover:text-sky-400">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                            </svg>
                        </div>
                        <p class="text-sm text-slate-400 font-medium">Click to upload prescription or report</p>
                    </div>
                </label>

                <div class="flex flex-col gap-3">
                    <h3 class="text-sm font-semibold text-slate-400">Additional Context (Optional)</h3>
                    <textarea id="notes" rows="4" placeholder="Patient symptoms or specific questions..." class="w-full rounded-2xl bg-slate-900/50 border border-slate-700 p-4 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition-all placeholder:text-slate-600 resize-none"></textarea>
                </div>

                <button id="analyzeBtn" class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-sky-500/20 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">ANALYZE DOCUMENT</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>
            </div>
            
            <p class="text-[10px] text-slate-500 text-center uppercase tracking-widest px-4">
                Powered by Gemini 1.5 Flash • For educational purposes only
            </p>
        </div>

        <div id="resultCard" class="glass rounded-3xl p-8 flex flex-col gap-6 opacity-40 grayscale transition-all duration-500">
            <h2 class="text-xl font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-sky-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
                </svg>
                Extracted Insights
            </h2>
            <div id="analysisResult" class="text-slate-300 leading-relaxed text-sm whitespace-pre-wrap">
                Analysis results will appear here after you upload and analyze a medical document.
            </div>
        </div>
    </main>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const analysisResult = document.getElementById('analysisResult');
        const notes = document.getElementById('notes');
        const resultCard = document.getElementById('resultCard');

        let base64Image = '';

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64Image = event.target.result;
                    imagePreview.src = base64Image;
                    previewContainer.classList.remove('hidden');
                    uploadPrompt.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!base64Image) {
                alert('Please upload an image first');
                return;
            }

            // UI Loading State
            analyzeBtn.disabled = true;
            btnText.textContent = 'ANALYZING...';
            btnLoader.classList.remove('hidden');
            resultCard.classList.add('animate-pulse');

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: base64Image,
                        notes: notes.value
                    })
                });

                const data = await response.json();
                
                if (data.analysis) {
                    analysisResult.textContent = data.analysis;
                    resultCard.classList.remove('opacity-40', 'grayscale', 'animate-pulse');
                } else {
                    analysisResult.textContent = 'Error: ' + (data.error || 'Unknown error');
                }
            } catch (error) {
                console.error(error);
                analysisResult.textContent = 'Failed to connect to the server.';
            } finally {
                analyzeBtn.disabled = false;
                btnText.textContent = 'ANALYZE DOCUMENT';
                btnLoader.classList.add('hidden');
                resultCard.classList.remove('animate-pulse');
            }
        });
    </script>
</body>
</html>
